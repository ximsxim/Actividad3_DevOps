name: CI/CD Pipeline (Simulación)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r app/requirements.txt pytest

    - name: Run tests
      run: |
        cd app
        python -m pytest tests/ -v

    - name: Build Docker image
      run: docker build -t mi-app-flask app/

    - name: Run container (simulate deployment)
      run: |
        docker run -d -p 5000:5000 --name mi-app-test mi-app-flask
        sleep 5
        curl http://localhost:5000 || echo "Application started"

    - name: Stop and remove container
      run: |
        docker stop mi-app-test
        docker rm mi-app-test